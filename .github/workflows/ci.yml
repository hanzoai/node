name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  schedule:
    # Run comprehensive tests daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  CARGO_TERM_COLOR: always
  IS_TESTING: 1
  RUST_BACKTRACE: 1
  CI: 1

jobs:
  # Quick checks that should pass before running expensive tests
  pre-checks:
    name: Pre-flight Checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Check formatting
        run: cargo fmt -- --check

      - name: Run clippy
        run: cargo clippy --all-features -- -D warnings
        continue-on-error: true  # Allow warnings temporarily

  # Unit tests - fast, isolated component tests
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    strategy:
      matrix:
        package:
          - hanzo-message-primitives
          - hanzo-sqlite
          - hanzo-embedding
          - hanzo-tools-primitives
          - hanzo-crypto-identities
          - hanzo-pqc
          - hanzo-kbs
          - hanzo-fs
          - hanzo-sheet
          - hanzo-mcp
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo index
        uses: actions/cache@v3
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-${{ matrix.package }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Run unit tests for ${{ matrix.package }}
        run: |
          echo "Testing ${{ matrix.package }}..."
          cargo test --package ${{ matrix.package }} --lib -- --test-threads=1

  # Integration tests - test component interactions
  integration-tests:
    name: Integration Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    services:
      # Provide test infrastructure
      postgres:
        image: postgres:15
        env:
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            pkg-config \
            protobuf-compiler \
            libprotobuf-dev

      - name: Cache cargo registry
        uses: actions/cache@v3
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-integration-${{ hashFiles('**/Cargo.lock') }}

      - name: Run integration tests
        env:
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/test
          REDIS_URL: redis://localhost:6379
        run: |
          echo "Running integration tests..."
          cargo test --test '*' -- --test-threads=1 --nocapture
        continue-on-error: true  # Allow failures temporarily during development

  # Component-specific tests
  lancedb-tests:
    name: LanceDB Vector Store Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Python for LanceDB
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install LanceDB
        run: |
          pip install lancedb numpy

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-lancedb-${{ hashFiles('**/Cargo.lock') }}

      - name: Run LanceDB tests
        run: |
          echo "Testing LanceDB integration..."
          # Create test for vector operations
          cat > tests/lancedb_test.rs << 'EOF'
          #[cfg(test)]
          mod lancedb_tests {
              use super::*;
              
              #[tokio::test]
              async fn test_vector_insertion() {
                  println!("Testing vector insertion...");
                  // TODO: Implement actual test
                  assert!(true);
              }
              
              #[tokio::test]
              async fn test_similarity_search() {
                  println!("Testing similarity search...");
                  // TODO: Implement actual test
                  assert!(true);
              }
          }
          EOF
          cargo test --test lancedb_test -- --nocapture
        continue-on-error: true

  # Docker runtime tests
  docker-tests:
    name: Docker Runtime Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-docker-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Docker tests
        run: |
          echo "Testing Docker runtime..."
          cargo test docker_integration_test -- --test-threads=1 --nocapture
        continue-on-error: true

  # Kubernetes runtime tests
  k8s-tests:
    name: Kubernetes Runtime Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Setup KIND (Kubernetes in Docker)
        uses: helm/kind-action@v1.8.0
        with:
          cluster_name: test-cluster

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-k8s-${{ hashFiles('**/Cargo.lock') }}

      - name: Run Kubernetes tests
        run: |
          echo "Testing Kubernetes runtime..."
          kubectl get nodes
          cargo test kubernetes_integration_test -- --test-threads=1 --nocapture
        continue-on-error: true

  # WASM runtime tests
  wasm-tests:
    name: WASM Runtime Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust with WASM target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown, wasm32-wasi

      - name: Install wasmtime
        run: |
          curl https://wasmtime.dev/install.sh -sSf | bash
          echo "$HOME/.wasmtime/bin" >> $GITHUB_PATH

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-wasm-${{ hashFiles('**/Cargo.lock') }}

      - name: Run WASM tests
        run: |
          echo "Testing WASM runtime..."
          cargo test --package hanzo-runtime-tests wasm_tests -- --nocapture
        continue-on-error: true

  # Performance benchmarks
  benchmarks:
    name: Performance Benchmarks
    runs-on: ubuntu-latest
    needs: pre-checks
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-bench-${{ hashFiles('**/Cargo.lock') }}

      - name: Run benchmarks
        run: |
          echo "Running performance benchmarks..."
          cd hanzo-bin/hanzo-node
          cargo bench --no-fail-fast
        continue-on-error: true

      - name: Upload benchmark results
        uses: actions/upload-artifact@v4
        with:
          name: benchmark-results
          path: target/criterion

  # Test coverage analysis
  coverage:
    name: Code Coverage
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-coverage-${{ hashFiles('**/Cargo.lock') }}

      - name: Generate coverage report
        run: |
          cargo tarpaulin \
            --workspace \
            --exclude hanzo_node \
            --exclude hanzoai \
            --timeout 300 \
            --out Html \
            --output-dir coverage
        continue-on-error: true

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage/tarpaulin-report.html

      - name: Upload to Codecov
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage/cobertura.xml
          fail_ci_if_error: false

  # Security audit
  security-audit:
    name: Security Audit
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run security audit
        run: cargo audit

  # Build release binary
  build-release:
    name: Build Release Binary
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    strategy:
      matrix:
        target:
          - x86_64-unknown-linux-gnu
          - aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-release-${{ matrix.target }}-${{ hashFiles('**/Cargo.lock') }}

      - name: Build release binary
        run: |
          cargo build \
            --release \
            --target ${{ matrix.target }} \
            --bin hanzod \
            --features "hanzo_node/swagger-ui"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: hanzo-node-${{ matrix.target }}
          path: target/${{ matrix.target }}/release/hanzod

  # Docker image build and test
  docker-build:
    name: Docker Build & Test
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: hanzoai/hanzo-node:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Test Docker image
        run: |
          docker run -d \
            --name hanzo-test \
            -p 3690:3690 \
            hanzoai/hanzo-node:test
          
          # Wait for service to be ready
          sleep 10
          
          # Test health endpoint
          curl -f http://localhost:3690/v2/health || exit 1
          
          # Clean up
          docker stop hanzo-test
          docker rm hanzo-test

  # End-to-end tests with full stack
  e2e-tests:
    name: End-to-End Tests
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    services:
      ollama:
        image: ollama/ollama:latest
        ports:
          - 11434:11434

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo build
        uses: actions/cache@v3
        with:
          path: target
          key: ${{ runner.os }}-cargo-build-e2e-${{ hashFiles('**/Cargo.lock') }}

      - name: Pull Ollama model
        run: |
          curl -X POST http://localhost:11434/api/pull \
            -H "Content-Type: application/json" \
            -d '{"name": "qwen2.5:0.5b"}'

      - name: Run E2E tests
        env:
          EMBEDDINGS_SERVER_URL: http://localhost:11434
          USE_NATIVE_EMBEDDINGS: true
        run: |
          cargo test end_to_end_test -- --test-threads=1 --nocapture
        continue-on-error: true

  # Matrix test for all comprehensive scenarios
  matrix-tests:
    name: Matrix Demo Tests
    runs-on: ubuntu-latest
    needs: pre-checks
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run matrix tests
        run: |
          cargo test matrix_demo_test -- --test-threads=1 --nocapture

  # Final status check
  status-check:
    name: CI Status Check
    runs-on: ubuntu-latest
    needs: 
      - pre-checks
      - unit-tests
      - integration-tests
      - lancedb-tests
      - docker-tests
      - k8s-tests
      - wasm-tests
      - security-audit
      - build-release
    if: always()
    steps:
      - name: Check status
        run: |
          echo "CI pipeline completed"
          echo "Unit tests: ${{ needs.unit-tests.result }}"
          echo "Integration tests: ${{ needs.integration-tests.result }}"
          echo "Security audit: ${{ needs.security-audit.result }}"
          
          # Fail if critical jobs failed
          if [[ "${{ needs.unit-tests.result }}" == "failure" ]] || \
             [[ "${{ needs.security-audit.result }}" == "failure" ]]; then
            echo "Critical tests failed"
            exit 1
          fi
          
          echo "All critical tests passed!"

  # Nightly comprehensive test suite
  nightly-comprehensive:
    name: Nightly Comprehensive Tests
    runs-on: ubuntu-latest
    if: github.event.schedule == '0 2 * * *'
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Run all tests with all features
        run: |
          cargo test \
            --workspace \
            --all-features \
            -- --test-threads=1 \
            --include-ignored
        continue-on-error: true

      - name: Generate comprehensive report
        run: |
          echo "# Nightly Test Report" > nightly_report.md
          echo "Date: $(date)" >> nightly_report.md
          echo "## Test Results" >> nightly_report.md
          cargo test --workspace -- --test-threads=1 2>&1 | tee -a nightly_report.md

      - name: Upload nightly report
        uses: actions/upload-artifact@v4
        with:
          name: nightly-test-report
          path: nightly_report.md