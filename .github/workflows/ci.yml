name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

env:
  CARGO_TERM_COLOR: always
  IS_TESTING: 1
  RUST_BACKTRACE: 1

jobs:
  test:
    name: Test Suite
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        components: rustfmt, clippy

    - name: Cache cargo registry
      uses: actions/cache@v3
      with:
        path: ~/.cargo/registry
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo index
      uses: actions/cache@v3
      with:
        path: ~/.cargo/git
        key: ${{ runner.os }}-cargo-index-${{ hashFiles('**/Cargo.lock') }}

    - name: Cache cargo build
      uses: actions/cache@v3
      with:
        path: target
        key: ${{ runner.os }}-cargo-build-target-${{ hashFiles('**/Cargo.lock') }}

    - name: Build
      run: cargo build --verbose

    - name: Run lib tests
      run: |
        echo "Running library tests..."
        # Skip hanzo_sqlite tests in CI as they require database setup
        cargo test --lib --workspace --exclude hanzo_sqlite -- --test-threads=1

    - name: Run doc tests
      run: |
        echo "Running documentation tests..."
        cargo test --doc -- --test-threads=1

    - name: Run integration tests
      run: |
        echo "Running integration tests..."
        cargo test --test '*' -- --test-threads=1 --nocapture
      continue-on-error: true  # Allow integration tests to fail temporarily

    - name: Check formatting
      run: cargo fmt -- --check

    - name: Run clippy
      run: cargo clippy --all-features -- -W warnings
      continue-on-error: true  # Allow clippy warnings temporarily

  build-release:
    name: Build Release
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-toolchain@stable

    - name: Build release
      run: cargo build --release --verbose

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: hanzo-node
        path: target/release/hanzod