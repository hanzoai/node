name: Docker Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: false

jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/node
      context: .
      dockerfile: docker/Dockerfile
      platforms: linux/amd64
      build-args: |
        BUILD_TYPE=release
    secrets: inherit
