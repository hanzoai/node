name: Docker (libp2p-relayer)
on:
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type (debug/release)'
        required: true
        default: 'release'
        type: choice
        options:
          - debug
          - release
permissions:
  contents: read
  packages: write
jobs:
  docker:
    uses: hanzoai/.github/.github/workflows/docker-build.yml@main
    with:
      image: ghcr.io/hanzoai/libp2p-relayer
      dockerfile: docker/Dockerfile.libp2p-relayer
      build-args: |
        BUILD_TYPE=${{ github.event.inputs.build_type || 'release' }}
    secrets: inherit
